<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LifeHub</title>

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LifeHub" />
<meta name="theme-color" content="#7c6f9c" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%237c6f9c'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif'%3EL%3C/text%3E%3C/svg%3E" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --accent:#7c6f9c;
    --accent-soft:#efeaf6;
    --bg:#faf7f2;
    --card:#ffffff;
    --ink:#2c2a33;
    --muted:#8a8694;
    --line:#ece8f0;
    --good:#3f9d6d;
    --warn:#d98324;
    --bad:#c4544f;
    --radius:16px;
    --font:'Manrope', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--ink);
    font-size:15px;
    line-height:1.45;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0;font-weight:700}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  input,select,textarea{font-family:inherit;font-size:15px}

  /* Top bar */
  header.app{
    position:sticky;top:0;z-index:30;
    background:color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter:blur(10px);
    padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  }
  header.app .brand{font-size:20px;font-weight:800;letter-spacing:-.4px}
  header.app .brand span{color:var(--accent)}
  header.app .sub{font-size:12px;color:var(--muted)}

  main{max-width:760px;margin:0 auto;padding:16px 14px 30px}
  .tab-panel{display:none;animation:fade .25s ease}
  .tab-panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .panel-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
  .panel-head h2{font-size:22px;letter-spacing:-.5px}
  .panel-head .hint{font-size:12px;color:var(--muted)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .card + .card{margin-top:12px}

  .btn{background:var(--accent);color:#fff;padding:9px 14px;border-radius:11px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-size:14px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--accent-soft);color:var(--accent)}
  .btn.tiny{padding:5px 9px;font-size:12px;border-radius:8px}
  .btn.line{background:transparent;border:1px solid var(--line);color:var(--ink)}

  .row{display:flex;align-items:center;gap:10px}
  .spacer{flex:1}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
  .pill.gray{background:var(--line);color:var(--muted)}
  .pill.good{background:#e7f4ee;color:var(--good)}
  .pill.warn{background:#fbf0e1;color:var(--warn)}
  .pill.bad{background:#fae9e8;color:var(--bad)}

  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
  .empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:4px}

  /* list items */
  .item{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .check{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px;color:#fff}
  .item .check.on{background:var(--good);border-color:var(--good)}
  .item .body{flex:1;min-width:0}
  .item .title{font-weight:600}
  .item .meta{font-size:12px;color:var(--muted)}
  .item.done .title{text-decoration:line-through;color:var(--muted)}
  .item .acts{display:flex;gap:6px;flex:none}
  .icon-btn{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-size:15px}
  .icon-btn.del{background:#fae9e8;color:var(--bad)}

  .group-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
  .group-title .count{background:var(--line);color:var(--muted);border-radius:999px;padding:1px 8px;font-size:11px}

  /* budget columns */
  .cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .colcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px}
  .colcard h4{font-size:13px;font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between}
  .colcard h4 .sum{color:var(--accent)}
  .exp{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px dashed var(--line);font-size:14px}
  .exp:last-child{border-bottom:none}
  .exp .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .exp .amt{font-weight:700;font-variant-numeric:tabular-nums}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .stat{background:var(--accent-soft);border-radius:13px;padding:12px}
  .stat .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent)}
  .stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px;margin-top:2px}
  .stat.big{grid-column:1/-1}
  .stat.good .v{color:var(--good)} .stat.bad .v{color:var(--bad)}

  .monthnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
  .monthnav .m{font-weight:800;font-size:16px;min-width:130px;text-align:center}
  .monthnav button{width:36px;height:36px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-size:18px}

  .seg{display:flex;background:var(--accent-soft);border-radius:11px;padding:3px;gap:3px;margin-bottom:12px}
  .seg button{flex:1;padding:7px;border-radius:8px;font-weight:700;font-size:13px;color:var(--accent)}
  .seg button.on{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.06)}

  table.pay{width:100%;border-collapse:collapse;font-size:13px}
  table.pay th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:6px 6px;border-bottom:1px solid var(--line)}
  table.pay td{padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.pay td.num{text-align:right;font-variant-numeric:tabular-nums}

  /* calendar */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .dow{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:center;padding:4px 0}
  .cal .day{aspect-ratio:1;border:1px solid var(--line);border-radius:9px;display:flex;flex-direction:column;align-items:center;padding:5px 0 0;font-size:13px;background:var(--card);cursor:pointer}
  .cal .day.out{opacity:0;border:none;background:none;pointer-events:none}
  .cal .day.today{border-color:var(--accent);border-width:2px;font-weight:800}
  .cal .day.sel{background:var(--accent-soft)}
  .cal .day .dots{display:flex;gap:3px;margin-top:3px;min-height:6px}
  .cal .day .dot,.dot{width:6px;height:6px;border-radius:50%}
  .dot.pay{background:var(--bad)} .dot.note{background:var(--accent)}

  /* bottom nav */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:color-mix(in srgb, var(--card) 92%, transparent);
    backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:7px 4px calc(7px + env(safe-area-inset-bottom));
  }
  nav.tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;font-weight:600;padding:4px 0}
  nav.tabs button .ic{font-size:20px;line-height:1}
  nav.tabs button.on{color:var(--accent)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,18,28,.42);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .scrim.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto;animation:up .25s ease}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px;margin:20px}}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{font-size:18px;margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink)}
  .field textarea{min-height:64px;resize:vertical}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field.two > div{display:flex;flex-direction:column}
  .sheet-acts{display:flex;gap:10px;margin-top:16px}
  .sheet-acts .btn{flex:1;justify-content:center;padding:12px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{background:var(--accent-soft);color:var(--accent);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .chip button{color:var(--accent);font-weight:800;opacity:.6}
  .swatch{width:34px;height:34px;border-radius:9px;border:2px solid var(--line);padding:0}
  .swatch.on{border-color:var(--ink)}

  .fab{position:fixed;right:16px;bottom:calc(82px + env(safe-area-inset-bottom));z-index:45;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,0,0,.18)}

  .toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:11px;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}

  .setup{max-width:440px;margin:40px auto;padding:0 18px}
</style>
</head>
<body>

<header class="app">
  <div>
    <div class="brand">Life<span>Hub</span></div>
    <div class="sub" id="syncState">Connecting…</div>
  </div>
  <button class="btn ghost tiny" id="gearBtn" onclick="App.go('settings')">⚙︎ Settings</button>
</header>

<main>
  <section id="auth" style="display:none;max-width:420px;margin:36px auto;padding:0 18px">
    <div class="card" style="padding:22px">
      <div class="brand" style="font-size:26px;margin-bottom:4px">Life<span style="color:var(--accent)">Hub</span></div>
      <p class="muted" id="authSub" style="font-size:13px;margin-bottom:18px">Log in to your account</p>
      <div class="field"><label>Email</label><input id="auEmail" type="email" autocomplete="email" placeholder="you@email.com" /></div>
      <div class="field"><label>Password</label><input id="auPass" type="password" autocomplete="current-password" placeholder="At least 6 characters" /></div>
      <button class="btn" id="auBtn" style="width:100%;justify-content:center;padding:12px" onclick="App.authSubmit()">Log in</button>
      <p style="text-align:center;margin-top:14px;font-size:13px" class="muted">
        <span id="authToggleTxt">New here?</span>
        <a href="#" id="authToggleLink" onclick="App.authToggle();return false" style="color:var(--accent);font-weight:600">Create an account</a></p>
    </div>
  </section>

  <section id="paywall" style="display:none;max-width:440px;margin:24px auto;padding:0 18px">
    <div id="paywallBody"></div>
  </section>

  <section id="tab-shopping" class="tab-panel">
    <div class="panel-head"><h2>Shopping</h2><span class="hint">Tap circle = bought</span></div>
    <div id="shoppingList"></div>
  </section>

  <section id="tab-budget" class="tab-panel">
    <div class="panel-head"><h2>Budget</h2><span class="hint" id="budgetHint"></span></div>
    <div class="monthnav">
      <button onclick="App.shiftMonth(-1)">‹</button>
      <div class="m" id="monthLabel"></div>
      <button onclick="App.shiftMonth(1)">›</button>
    </div>
    <div class="seg" id="periodSeg">
      <button data-p="mid" class="on" onclick="App.setPeriod('mid')">Mid-month (15th)</button>
      <button data-p="end" onclick="App.setPeriod('end')">End-month (30th)</button>
    </div>
    <div id="budgetBody"></div>
  </section>

  <section id="tab-notes" class="tab-panel">
    <div class="panel-head"><h2>Notes</h2><span class="hint">Brain dump</span></div>
    <div id="notesBody"></div>
  </section>

  <section id="tab-calendar" class="tab-panel">
    <div class="panel-head"><h2>Calendar</h2><span class="hint">Payments & notes</span></div>
    <div class="monthnav">
      <button onclick="App.calShift(-1)">‹</button>
      <div class="m" id="calLabel"></div>
      <button onclick="App.calShift(1)">›</button>
    </div>
    <div id="calBody"></div>
    <div id="calDay" style="margin-top:16px"></div>
  </section>

  <section id="tab-loans" class="tab-panel">
    <div class="panel-head"><h2>Long-term payments</h2><span class="hint">Amortization & carryover</span></div>
    <div id="loanBody"></div>
  </section>

  <section id="tab-settings" class="tab-panel">
    <div class="panel-head"><h2>Settings</h2></div>
    <div id="settingsBody"></div>
  </section>
</main>

<button class="fab" id="fab" onclick="App.fab()">+</button>

<nav class="tabs" id="nav">
  <button data-t="shopping" onclick="App.go('shopping')"><span class="ic">🛒</span>Shopping</button>
  <button data-t="budget" onclick="App.go('budget')"><span class="ic">₱</span>Budget</button>
  <button data-t="loans" onclick="App.go('loans')"><span class="ic">💳</span>Loans</button>
  <button data-t="notes" onclick="App.go('notes')"><span class="ic">📝</span>Notes</button>
  <button data-t="calendar" onclick="App.go('calendar')"><span class="ic">🗓️</span>Calendar</button>
</nav>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const App = (() => {
  let sb=null, tab='shopping', period='mid';
  let activeLoanId = null;
  let recurringView = false;
  let month = new Date().toISOString().slice(0,7); // YYYY-MM
  let calMonth = new Date().toISOString().slice(0,7);
  let calSel = null;
  let activeShopImg = null;

  const DEFAULTS = {
    accent:'#7c6f9c', bg:'#faf7f2', font:'Manrope', currency:'₱',
    payMid:15, payEnd:30, savingsPct:20,
    cat_shopping:['Groceries','House things','Personal care','Pharmacy','Other'],
    cat_budget:['Bills','Food','Transport','Subscriptions','Health','Misc']
  };
  let S = {...DEFAULTS};

  const data = { shopping:[], incomes:[], expenses:[], recurring:[], notes:[], loans:[], payments:[], periods:[], submissions:[] };

  const $ = s => document.querySelector(s);
  const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const money = n => S.currency + Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2});
  const todayStr = () => new Date().toISOString().slice(0,10);
  const monthName = ym => { const [y,m]=ym.split('-'); return new Date(y,m-1,1).toLocaleString(undefined,{month:'long',year:'numeric'}); };
  
  function toast(msg){ 
    const t=$('#toast'); t.textContent=msg; t.classList.add('show'); 
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); 
  }

  function applyTheme(){
    const r=document.documentElement.style;
    r.setProperty('--accent',S.accent);
    r.setProperty('--bg',S.bg);
    r.setProperty('--accent-soft', mix(S.accent,'#ffffff',0.82));
    r.setProperty('--font', `'${S.font}', system-ui, sans-serif`);
    loadFont(S.font);
  }
  
  function mix(hex,white,t){
    const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    const m=c=>Math.round(c+(255-c)*t); return `rgb(${m(r)},${m(g)},${m(b)})`;
  }
  
  const loadedFonts=new Set();
  function loadFont(f){
    if(['system-ui','-apple-system'].includes(f)||loadedFonts.has(f))return;
    loadedFonts.add(f);
    const l=document.createElement('link'); l.rel='stylesheet';
    l.href=`https://fonts.googleapis.com/css2?family=${f.replace(/ /g,'+')}:wght@400;600;700;800&display=swap`;
    document.head.appendChild(l);
  }

  function compressImage(file, callback) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = event => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 400;
        let w = img.width, h = img.height;
        if(w > h) { if(w > max) { h *= max/w; w = max; } }
        else { if(h > max) { w *= max/h; h = max; } }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.7));
      };
    };
  }

  function downloadICS(title, dateStr, timeStr, notes){
    if(!dateStr){ toast('Add a due date first'); return; }
    const dt = new Date(`${dateStr}T${timeStr||'09:00'}:00`);
    const stamp = d => d.toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';
    const end = new Date(dt.getTime()+30*60000);
    const ics = [
      'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//LifeHub//EN','CALSCALE:GREGORIAN',
      'BEGIN:VEVENT','UID:'+Date.now()+'@lifehub',
      'DTSTAMP:'+stamp(new Date()),'DTSTART:'+stamp(dt),'DTEND:'+stamp(end),
      'SUMMARY:'+(title||'Reminder'), notes?('DESCRIPTION:'+String(notes).replace(/\n/g,'\\n')):'',
      'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+(title||'Reminder'),'TRIGGER:-PT0M','END:VALARM',
      'END:VEVENT','END:VCALENDAR'
    ].filter(Boolean).join('\r\n');
    const dataUri = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
    const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
    if(isiOS){ window.location.href = dataUri; } 
    else {
      const a=document.createElement('a'); a.href=dataUri;
      a.download=(title||'reminder').replace(/[^a-z0-9]/gi,'_').slice(0,30)+'.ics';
      document.body.appendChild(a); a.click(); a.remove();
    }
    toast('Opening reminder — tap Add in Calendar');
  }

  let uid=null, authEmail=null, authMode='login';
  let paid=false;
  let pendingPayImg=null;
  const ADMIN_UID = "16ef37a8-58a1-4c75-9c92-21ab0d28a06f";
  const isAdmin = () => uid === ADMIN_UID;
  
  const PAY = {
    price: "₱30",
    gcashNumber: "0951 751 6681",
    gcashName: "John Bryan Julieza",
    bank: "",
    qrUrl: ""
  };

  const SUPABASE_URL = "https://chkcpdoolfrfjesfkojn.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoa2NwZG9vbGZyZmplc2Zrb2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODEzNDgsImV4cCI6MjA5Nzk1NzM0OH0.SpJ2LrftcoGoF0VL0DJ9cMCHXHv03qnPj8xB5SvoHOE";

  function connect(){
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return true;
  }

  function showAuth(){
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    $('#paywall').style.display='none';
    $('#nav').style.display='none';
    $('#fab').style.display='none';
    $('#gearBtn').style.display='none';
    $('#auth').style.display='block';
    $('#syncState').textContent='Please log in';
  }
  
  function showApp(){
    $('#auth').style.display='none';
    $('#paywall').style.display='none';
    $('#nav').style.display='flex';
    $('#gearBtn').style.display='inline-flex';
    go('shopping');
  }
  
  function authToggle(){
    authMode = authMode==='login' ? 'signup' : 'login';
    const login = authMode==='login';
    $('#authSub').textContent = login ? 'Log in to your account' : 'Create your LifeHub account';
    $('#auBtn').textContent = login ? 'Log in' : 'Sign up';
    $('#authToggleTxt').textContent = login ? 'New here?' : 'Already have an account?';

    if(authMode==='signup' && pass.length<6){ toast('Password needs 6+ characters'); return; }
    $('#auBtn').textContent='Please wait…';
    try{
      if(authMode==='signup'){
        const { data, error } = await sb.auth.signUp({ email, password: pass });
        if(error) throw error;
        if(!data.session){
          toast('Account created — check your email to confirm, then log in.');
          authMode='login'; authToggle(); authToggle(); $('#auBtn').textContent='Log in'; return;
        }
      } else {

        if(error) throw error;
      }
    }catch(e){
      console.error(e);
      toast(e.message || 'Could not sign in');
      $('#auBtn').textContent = authMode==='login'?'Log in':'Sign up';
    }
  }

  async function loadAll(){
    $('#syncState').textContent='Syncing…';
    try{
      let { data:set } = await sb.from('app_settings').select('*').maybeSingle();
      if(set && set.data) S={...DEFAULTS, ...set.data};
      else await sb.from('app_settings').insert({ data:S });
      applyTheme();

      const grab = async (t, orderField) => { 
        let query = sb.from(t).select('*');
        if (orderField) query = query.order(orderField, { ascending: true });
        const { data: d, error } = await query;
        if (error) {
          const { data: retryData } = await sb.from(t).select('*');
          return retryData || [];
        }
        return d || []; 
      };

      data.shopping = await grab('shopping_items', 'created_at');
      data.incomes  = await grab('budget_incomes', 'created_at');
      data.expenses = await grab('budget_expenses', 'created_at');
      data.recurring= await grab('recurring_expenses', 'created_at');
      data.notes    = await grab('notes', 'created_at');
      data.loans    = await grab('loans', 'created_at');
      try { data.submissions = await grab('payment_submissions', 'created_at'); } catch(e){ data.submissions = []; }
      try { data.payments = await grab('loan_payments'); } catch(e) { data.payments = []; }
      try { data.periods  = await grab('loan_periods'); } catch(e) { data.periods = []; }

      await autoLogRecurring();
      $('#syncState').textContent='Synced ✓';
      renderAll();
    }catch(e){
      console.error(e);
      $('#syncState').textContent='Sync error';
      toast('Sync error — check configurations');
    }
  }

  async function autoLogRecurring(){
    const adds=[];
    for(const r of data.recurring.filter(x=>x.active!==false)){
      if(r.start_month && month < r.start_month) continue;
      if(r.end_month   && month > r.end_month)   continue;
      const exists = data.expenses.some(e=>e.recurring_id===r.id && e.month===month && e.period===r.period);
      if(!exists) adds.push({month, period:r.period, category:r.category, name:r.name, amount:r.amount, status:'planned', is_recurring:true, recurring_id:r.id});
    }
    if(adds.length){
      const {data:ins}=await sb.from('budget_expenses').insert(adds).select();
      if(ins) data.expenses.push(...ins);
    }
  }

  async function ins(t,row,arr){
    const {data:d,error}=await sb.from(t).insert(row).select();
    if(error){toast('Save failed');return null;}
    arr.push(d[0]); return d[0];
  }
  async function upd(t,id,patch,arr){
    const {error}=await sb.from(t).update(patch).eq('id',id);
    if(error){toast('Update failed');return;}
    const o=arr.find(x=>x.id===id); if(o)Object.assign(o,patch);
  }
  async function del(t,id,arr){
    const {error}=await sb.from(t).delete().eq('id',id);
    if(error){toast('Delete failed');return;}
    const i=arr.findIndex(x=>x.id===id); if(i>=0)arr.splice(i,1);
  }

  /* ----- Shopping ----- */
  function renderShopping(){
    const wrap=$('#shoppingList');
    if(!data.shopping.length){
      wrap.innerHTML=emptyState('Nothing on the list','Tap + to add your first item — with a price and a photo'); return;
    }
    const byCat={}; data.shopping.forEach(i=>{ (byCat[i.category]=byCat[i.category]||[]).push(i); });
    const toBuy=data.shopping.filter(i=>!i.bought);
    const totalToBuy=toBuy.reduce((s,i)=>s+Number(i.price||0),0);
    const totalAll=data.shopping.reduce((s,i)=>s+Number(i.price||0),0);
    let html=`<div class="summary">
      <div class="stat good"><div class="k">To-buy total</div><div class="v">${money(totalToBuy)}</div></div>
      <div class="stat"><div class="k">List total</div><div class="v">${money(totalAll)}</div></div></div>`;
    
    Object.keys(byCat).sort().forEach(cat=>{
      const items=byCat[cat].sort((a,b)=>a.bought-b.bought);
      const left=items.filter(i=>!i.bought).length;
      const catSum=items.filter(i=>!i.bought).reduce((s,i)=>s+Number(i.price||0),0);
      html+=`<div class="group-title">${esc(cat)} <span class="count">${left} to buy · ${money(catSum)}</span></div><div class="card">`;
      items.forEach(i=>{
        const meta=[i.qty?esc(i.qty):'', Number(i.price)>0?money(i.price):''].filter(Boolean).join(' · ');
        html+=`<div class="item ${i.bought?'done':''}">
          <button class="check ${i.bought?'on':''}" onclick="App.toggleShop('${i.id}')">${i.bought?'✓':''}</button>
          ${i.image?`<img src="${i.image}" alt="" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex:none" onclick="App.editShopForm('${i.id}')" />`:''}
          <div class="body"><div class="title" onclick="App.editShopForm('${i.id}')">${esc(i.name)}</div>${meta?`<div class="meta">${meta}</div>`:''}</div>
          <div class="acts"><button class="icon-btn del" onclick="App.delShop('${i.id}')">✕</button></div>
        </div>`;
      });
      html+=`</div>`;
    });
    wrap.innerHTML=html;
  }

    const next=!i.bought; await upd('shopping_items',id,{bought:next},data.shopping); renderShopping();
  }

  /* ----- Budget ----- */
  function renderBudget(){
    $('#monthLabel').textContent = monthName(month);
    $(`#periodSeg button[data-p="mid"]`).classList.toggle('on',period==='mid');
    $(`#periodSeg button[data-p="end"]`).classList.toggle('on',period==='end');
    
    if(recurringView){ renderRecurringList(); return; }
    
    const incs = data.incomes.filter(x=>x.month===month && x.period===period);
    const exps = data.expenses.filter(x=>x.month===month && x.period===period);
    
    const totalInc = incs.reduce((s,x)=>s+Number(x.amount||0),0);
    const totalExpPlanned = exps.reduce((s,x)=>s+Number(x.amount||0),0);
    const totalExpActual = exps.filter(x=>x.status==='paid').reduce((s,x)=>s+Number(x.amount||0),0);
    
    const savingsAmt = totalInc * (Number(S.savingsPct||0)/100);
    const allowancePlanned = totalInc - savingsAmt - totalExpPlanned;
    const allowanceActual = totalInc - savingsAmt - totalExpActual;

    $('#budgetHint').innerHTML = `<button class="btn ghost tiny" onclick="App.recurringForm()">⚙ Templates</button>`;
    
    let html = `
      <div class="summary">
        <div class="stat big"><div class="k">Incomes Total</div><div class="v good">${money(totalInc)}</div></div>
        <div class="stat"><div class="k">Savings Target (${S.savingsPct}%)</div><div class="v">${money(savingsAmt)}</div></div>
        <div class="stat"><div class="k">Spent (Actual)</div><div class="v bad">${money(totalExpActual)}</div></div>
        <div class="stat ${allowancePlanned<0?'bad':'good'}"><div class="k">Planned Safe Allowance</div><div class="v">${money(allowancePlanned)}</div></div>
        <div class="stat ${allowanceActual<0?'bad':'good'}"><div class="k">Current Safe Allowance</div><div class="v">${money(allowanceActual)}</div></div>
      </div>`;

    html += `<div class="group-title">Incomes / Salary lines <button class="btn ghost tiny" style="margin-left:auto" onclick="App.incomeAddForm()">+ Add</button></div>
      <div class="card">`;
    if(!incs.length) html += `<div class="empty">No income logged for this period</div>`;
    else incs.forEach(i=>{
      html += `<div class="item">
        <div class="body"><div class="title">${esc(i.name)}</div></div>
        <div class="amt" style="margin-right:12px;font-weight:700">${money(i.amount)}</div>
        <div class="acts">
          <button class="icon-btn" onclick="App.editIncomeForm('${i.id}')">✎</button>
          <button class="icon-btn del" onclick="App.delInc('${i.id}')">✕</button>
        </div>
      </div>`;
    });
    html += `</div>`;

    const byCat = {}; S.cat_budget.forEach(c=>byCat[c]=[]);
    exps.forEach(e=>{ (byCat[e.category] = byCat[e.category] || []).push(e); });

    html += `<div class="group-title">Budgeted Expenses</div><div class="cols">`;
    Object.keys(byCat).forEach(cat=>{
      const list = byCat[cat];
      const sum = list.reduce((s,x)=>s+Number(x.amount||0),0);
      html += `<div class="colcard">
        <h4><span>${esc(cat)}</span><span class="sum">${money(sum)}</span></h4>`;
      if(!list.length) html += `<div class="muted" style="font-size:12px;padding:6px 0">Empty</div>`;
      else list.forEach(e=>{
        html += `<div class="exp">
          <button class="check tiny ${e.status==='paid'?'on':''}" style="width:16px;height:16px;font-size:10px;border-radius:5px" onclick="App.toggleExp('${e.id}')">${e.status==='paid'?'✓':''}</button>
          <span class="nm" style="${e.status==='paid'?'text-decoration:line-through;opacity:0.6':''}" onclick="App.expenseForm('${e.id}')">${esc(e.name)}</span>
          <span class="amt">${money(e.amount)}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
    
    $('#budgetBody').innerHTML = html;
  }

  async function saveRecurring(id){
    const name=$('#rec_name').value.trim(), category=$('#rec_cat').value, amount=Number($('#rec_amount').value)||0;
    if(!name){ toast('Title required'); return; }
    const row={
      name, category, amount, period:$('#rec_period').value,
      start_month:$('#rec_start').value||null, end_month:$('#rec_end').value||null,
      active:$('#rec_active').checked
    };
    if(id){ await upd('recurring_expenses',id,row,data.recurring); }
    else { await ins('recurring_expenses',row,data.recurring); }
    closeSheet(); renderRecurringList();

  async function askDelRecurring(id){ if(confirm('Delete this template calculation?')){ await del('recurring_expenses',id,data.recurring); closeSheet(); renderRecurringList(); } }

  /* ----- Notes ----- */
  function renderNotes(){
    const wrap=$('#notesBody');
    if(!data.notes.length){ wrap.innerHTML=emptyState('No thoughts recorded','Tap + to open a blank fast clean note card pads'); return; }
    let html=`<div class="cols" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">`;
    data.notes.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(n=>{
      html+=`<div class="card" style="display:flex;flex-direction:column;gap:8px;cursor:pointer" onclick="App.noteForm('${n.id}')">
        <div style="display:flex;align-items:baseline;justify-content:space-between"><b style="font-size:16px">${esc(n.title||'Untitled Card')}</b><span class="muted" style="font-size:11px">${n.date?n.date.slice(5):''}</span></div>
        <p style="margin:0;font-size:14px;white-space:pre-wrap;color:color-mix(in srgb, var(--ink) 84%, transparent)">${esc(n.content)}</p>
      </div>`;
    });
    html+=`</div>`; wrap.innerHTML=html;
  }
  
  function noteForm(idOrDate){
    let n=null; let fallbackDate='';
    if(idOrDate && idOrDate.includes('-')) fallbackDate=idOrDate;
    else if(idOrDate) n=data.notes.find(x=>x.id===idOrDate);
    
    openSheet(`
      <h3>${n?'View / Edit Note':'Write New Thought'}</h3>
      <div class="field"><label>Title Header</label><input id="n_title" value="${n?esc(n.title):''}" placeholder="General idea heading..." /></div>
      <div class="field"><label>Operational Association Date (Optional)</label><input id="n_date" type="date" value="${n?.date||fallbackDate||''}" /></div>
      <div class="field"><label>Note Text Content Body</label><textarea id="n_content" placeholder="Type structural markdown text descriptions..." style="min-height:160px">${n?esc(n.content):''}</textarea></div>
      ${n?`<div style="margin-top:4px"><button class="btn line tiny del" onclick="App.delNote('${n.id}')">✕ Delete Note</button></div>`:''}
      <div class="sheet-acts">
        <button class="btn line" onclick="App.closeSheet()">Cancel</button>
        <button class="btn" onclick="App.saveNote('${n?.id||''}')">Save Note</button>
      </div>`);
  }
  async function saveNote(id){
    const content=$('#n_content').value.trim(); if(!content){ toast('Text body empty'); return; }
    const row={title:$('#n_title').value.trim()||'Untitled Note', date:$('#n_date').value||null, content};
    if(id){ await upd('notes',id,row,data.notes); }
    else { await ins('notes',row,data.notes); }
    closeSheet(); renderNotes(); if(tab==='calendar') renderCalendar();
  }
  async function delNote(id){ if(confirm('Delete note card entry completely?')){ await del('notes',id,data.notes); closeSheet(); renderNotes(); if(tab==='calendar') renderCalendar(); } }

  /* ----- Calendar ----- */
  function renderCalendar(){
    $('#calLabel').textContent = monthName(calMonth);
    const wrap=$('#calBody');
    
    const [year,monthIdx]=calMonth.split('-').map(Number);
    const firstDayIndex = new Date(year, monthIdx-1, 1).getDay();
    const totalDays = new Date(year, monthIdx, 0).getDate();
    
    let html=`<div class="cal">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+=`<div class="dow">${d}</div>`);
    
    for(let i=0; i<firstDayIndex; i++) html+=`<div class="day out"></div>`;
    
    for(let d=1; d<=totalDays; d++){
      const dayStr = `${calMonth}-${String(d).padStart(2,'0')}`;
      const isToday = dayStr === todayStr();
      const isSel = dayStr === calSel;
      
      const hasExp = data.expenses.some(x=>x.date === dayStr);
      const hasNote = data.notes.some(x=>x.date === dayStr);
      
      html+=`<div class="day ${isToday?'today':''} ${isSel?'sel':''}" onclick="App.calPick('${dayStr}')">
        <span>${d}</span>
        <div class="dots">
          ${hasExp?`<div class="dot pay"></div>`:''}
          ${hasNote?`<div class="dot note"></div>`:''}
        </div>
      </div>`;
    }
    html+=`</div>`; wrap.innerHTML=html;
    renderCalDayAgenda();
  }
  
  function calShift(n){
    const [y,m]=calMonth.split('-').map(Number); const d=new Date(y,m-1+n,1);
    calMonth=d.toISOString().slice(0,7); renderCalendar();
  }
  function calPick(dStr){ calSel=dStr; renderCalendar(); }
  
  function renderCalDayAgenda(){
    const box=$('#calDay'); if(!calSel){ box.innerHTML=`<p class="muted宣 text-align:center;font-size:13px">Tap a tracking operational calendar block grid above to construct view points</p>`; return; }
    const dayExps = data.expenses.filter(x=>x.date === calSel);
    const dayNotes = data.notes.filter(x=>x.date === calSel);
    
    let html=`<div class="panel-head" style="margin-top:4px"><h3>Agenda: ${calSel}</h3><button class="btn ghost tiny" onclick="App.noteForm(calSel)">+ Add Note</button></div>`;
    if(!dayExps.length && !dayNotes.length){ html+=`<div class="card empty">No expenses or markdown logs stamped scheduled today</div>`; box.innerHTML=html; return; }
    
    if(dayExps.length){
      html+=`<div class="group-title">Payments / Expenses</div><div class="card">`;
      dayExps.forEach(e=>{
        html+=`<div class="item">
          <button class="check tiny ${e.status==='paid'?'on':''}" style="width:16px;height:16px;border-radius:4px" onclick="App.toggleExp('${e.id}')">${e.status==='paid'?'✓':''}</button>
          <div class="body"><div class="title">${esc(e.name)} <span class="pill gray tiny">${esc(e.category)}</span></div></div>
          <div class="amt" style="font-weight:700;margin-right:8px">${money(e.amount)}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    if(dayNotes.length){
      html+=`<div class="group-title">Day Associated Notes</div>`;
      dayNotes.forEach(n=>{
        html+=`<div class="card" style="margin-top:6px;cursor:pointer" onclick="App.noteForm('${n.id}')">
          <b>${esc(n.title)}</b><p style="margin:4px 0 0;font-size:13px;white-space:pre-wrap">${esc(n.content)}</p>
        </div>`;
      });
    }
    box.innerHTML=html;
  }

  /* ----- Loans / Long-term payments ----- */
  function renderLoans(){
    const wrap=$('#loanBody');
    if(activeLoanId) { renderLoanDetails(activeLoanId); return; }
    if(!data.loans.length){ wrap.innerHTML=emptyState('No tracking amortization entries active','Tap + bottom actions to formulate structured debts timelines matrix tracking metrics'); return; }
    
    let html=``;
    data.loans.forEach(l=>{
      const lP = data.payments.filter(p=>p.loan_id===l.id);
      const totalPaid = lP.reduce((s,p)=>s+Number(p.amount||0),0);
      const rem = Number(l.total_amount||0) - totalPaid;
      const pct = Math.min(100, Math.round((totalPaid / (l.total_amount||1))*100));
      
      html+=`<div class="card" style="cursor:pointer" onclick="App.openLoan('${l.id}')">
        <div style="display:flex;justify-content:between;align-items:baseline">
          <b style="font-size:17px">${esc(l.name)}</b><div class="spacer"></div><span class="pill">${pct}% paid</span>
        </div>
        <div class="muted" style="font-size:12px;margin-top:2px">Lender Institution: ${esc(l.lender||'Direct')}</div>
        <div style="background:var(--line);height:6px;border-radius:99px;margin:10px 0 6px;overflow:hidden">
          <div style="background:var(--accent);height:100%;width:${pct}%"></div>
        </div>
        <div class="row" style="font-size:13px;margin-top:4px">
          <div>Paid: <b>${money(totalPaid)}</b></div><div class="spacer"></div>
          <div class="muted">Remaining: <b style="color:var(--ink)">${money(rem)}</b> / ${money(l.total_amount)}</div>
        </div>
      </div>`;
    });
    wrap.innerHTML=html;
  }
  
  function openLoan(id){ activeLoanId=id; renderLoans(); }
  
  function renderLoanDetails(id){
    const l = data.loans.find(x=>x.id===id); if(!l) { activeLoanId=null; renderLoans(); return; }
    const wrap=$('#loanBody');
    
    const lP = data.payments.filter(p=>p.loan_id===l.id);
    const totalPaid = lP.reduce((s,p)=>s+Number(p.amount||0),0);
    const rem = Number(l.total_amount||0) - totalPaid;
    
    let html=`<div style="margin-bottom:12px"><button class="btn ghost tiny" onclick="App.openLoan(null)">← Back to Loans List</button></div>
      <div class="card" style="position:relative">
        <div style="position:absolute;top:12px;right:12px">
          <button class="icon-btn tiny line" style="display:inline-flex" onclick="App.loanForm('${l.id}')">✎ Edit</button>
        </div>
        <h3 style="font-size:20px">${esc(l.name)}</h3>
        <p class="muted" style="font-size:13px;margin:2px 0 10px">Lender Institution context string: <b>${esc(l.lender||'N/A')}</b></p>
        <div class="summary" style="margin-top:0">
          <div class="stat"><div class="k">Principal Overall</div><div class="v">${money(l.total_amount)}</div></div>
          <div class="stat good"><div class="k">Aggregated Paid</div><div class="v">${money(totalPaid)}</div></div>
          <div class="stat bad"><div class="k">Outstanding Remaining</div><div class="v">${money(rem)}</div></div>
          <div class="stat"><div class="k">Amortization / Term</div><div class="v" style="font-size:15px;font-weight:700;margin-top:6px">${l.months_term||'Variable'} mos @ ${money(l.monthly_payment)}/mo</div></div>
        </div>
      </div>`;

    html+=`<div class="group-title">Amortization Schedule Ledger / Carryover Logs <button class="btn ghost tiny" style="margin-left:auto" onclick="App.planForm()">+ Add Term Payment</button></div>
      <div class="card" style="padding:4px">
        <table class="pay">
          <thead><tr><th>Period Cycle</th><th>Due Date</th><th class="num">Expected Target</th><th class="num">Amount Settled</th><th>Status Actions</th></tr></thead>
          <tbody>`;
    
    const sPeriods = data.periods.filter(p=>p.loan_id===l.id).sort((a,b)=>String(a.period_name).localeCompare(String(b.period_name)));
    if(!sPeriods.length) html+=`<tr><td colspan="5" class="empty">No tracked operational cycle splits initiated structure. Tap + button above to log one.</td></tr>`;
    else sPeriods.forEach(p=>{
      const matchPay = lP.find(x=>x.period_id === p.id);
      html+=`<tr>
        <td><b>${esc(p.period_name)}</b></td>
        <td><span class="muted" style="font-size:12px">${p.due_date||'Unscheduled'}</span>
          ${p.due_date?`<button style="font-size:11px;color:var(--accent);margin-left:4px" onclick="App.remindLoan('${p.id}')">⏰ ICS</button>`:''}</td>
        <td class="num">${money(p.expected_amount || l.monthly_payment)}</td>
        <td class="num font-weight:700">${matchPay?money(matchPay.amount):'—'}</td>
        <td>
          ${matchPay?`<span class="pill good">Paid</span> <button class="icon-btn del tiny" style="display:inline-grid;width:20px;height:20px;font-size:10px" onclick="App.unpayPeriod('${p.id}','${matchPay.id}')">✕</button>`:
          `<button class="btn ghost tiny" onclick="App.payForm('${p.id}')">Settle</button>`}
          <button class="icon-btn del tiny" style="display:inline-grid;width:20px;height:20px;font-size:10px;margin-left:4px" onclick="App.delPeriod('${p.id}')">✕</button>
        </td>
      </tr>`;
    });
    
    html+=`</tbody></table></div>`; wrap.innerHTML=html;
  }
  
  function remindLoan(pId){
    const p = data.periods.find(x=>x.id===pId); if(!p) return;
    const l = data.loans.find(x=>x.id===p.loan_id); if(!l) return;
    downloadICS(`Pay Loan: ${l.name} (${p.period_name})`, p.due_date, '10:00', `Expectation requirement: ${money(p.expected_amount||l.monthly_payment)} due via provider context system.`);
  }

  function loanForm(id){
    const l=id?data.loans.find(x=>x.id===id):null;
    openSheet(`
      <h3>${l?'Edit Long-term Debt Details':'Create New Amortization Log Matrix'}</h3>
      <div class="field"><label>Loan Account Matrix Identifier Title</label><input id="lo_name" value="${l?esc(l.name):''}" placeholder="e.g. Car Amortization, Housing Loan" /></div>
      <div class="field"><label>Lender Institution / Provider Name</label><input id="lo_lender" value="${l?esc(l.lender):''}" placeholder="e.g. BDO, Bank, Family Member" /></div>
      <div class="field"><label>Total Principal Balance Amount</label><input id="lo_total" type="number" step="any" value="${l?l.total_amount||'':''}" placeholder="0.00" /></div>
      <div class="field two">
        <div><label>Monthly Recurring Charge</label><input id="lo_monthly" type="number" step="any" value="${l?l.monthly_payment||'':''}" placeholder="0.00" /></div>
        <div><label>Months Term Span Duration</label><input id="lo_term" type="number" value="${l?l.months_term||'':''}" placeholder="e.g. 36" /></div>
      </div>
      ${l?`<div style="margin-top:4px"><button class="btn line tiny del" onclick="App.delLoan('${l.id}')">✕ Delete Account Matrix Log Completely</button></div>`:''}
      <div class="sheet-acts">
        <button class="btn line" onclick="App.closeSheet()">Cancel</button>
        <button class="btn" onclick="App.saveLoan('${id||''}')">Save Account</button>
      </div>`);
  }
  async function saveLoan(id){
    const name=$('#lo_name').value.trim(), total_amount=Number($('#lo_total').value)||0;
    if(!name||!total_amount){ toast('Name and total principal balance required'); return; }
    const row={name, lender:$('#lo_lender').value.trim(), total_amount, monthly_payment:Number($('#lo_monthly').value)||0, months_term:Number($('#lo_term').value)||null};
    if(id){ await upd('loans',id,row,data.loans); closeSheet(); renderLoans(); }
    else { const d=await ins('loans',row,data.loans); closeSheet(); if(d) openLoan(d.id); }
  }
  async function delLoan(id){ if(confirm('Are you sure you want to delete this loan track and all associated amortization schedule items?')){ await del('loans',id,data.loans); activeLoanId=null; closeSheet(); renderLoans(); } }

  function planForm(){
    openSheet(`
      <h3>Log Term Schedule Split</h3>
      <div class="field"><label>Period Cycle Term Label</label><input id="p_name" placeholder="e.g. Month 1, Month 2, Mar 2026" /></div>
      <div class="field"><label>Calendar Due Date</label><input id="p_due" type="date" value="${todayStr()}" /></div>
      <div class="field"><label>Target Expected Amount (Optional)</label><input id="p_expected" type="number" step="any" placeholder="Defaults to loan monthly calculation standard" /></div>

        <button class="btn line" onclick="App.closeSheet()">Cancel</button>
        <button class="btn" onclick="App.savePlan()">Instantiate Split</button>
      </div>`);

  async function savePlan(){
    const p_name=$('#p_name').value.trim(); if(!p_name){ toast('Period label description name required'); return; }
    const row={loan_id:activeLoanId, period_name:p_name, due_date:$('#p_due').value||null, expected_amount:Number($('#p_expected').value)||null};
    const d=await ins('loan_periods',row,data.periods); if(d) { closeSheet(); renderLoans(); }
  }
  async function delPeriod(id){ if(confirm('Delete schedule split row configuration row?')){ await del('loan_periods',id,data.periods); renderLoans(); } }

  function payForm(pId){
    const p = data.periods.find(x=>x.id===pId); const l = data.loans.find(x=>x.id===activeLoanId);
    const def = p?.expected_amount || l?.monthly_payment || 0;
    openSheet(`
      <h3>Record Actual Outflow Settle Payment</h3>
      <div class="field"><label>Actual Cash Flow Settled Amount</label><input id="py_amt" type="number" step="any" value="${def}" /></div>
      <div class="field"><label>Date Paid</label><input id="py_date" type="date" value="${todayStr()}" /></div>
      <div class="field"><label>Reference Number / Transaction Note Attachment</label><input id="py_note" placeholder="e.g. Reference, Bank Transfer ID String" /></div>
      <div class="sheet-acts">
        <button class="btn line" onclick="App.closeSheet()">Cancel</button>
        <button class="btn" onclick="App.confirmPay('${pId}')">Commit Outflow Balance</button>
      </div>`);
  }
  async function confirmPay(pId){
    const amt=Number($('#py_amt').value)||0; if(!amt){ toast('Valid cash amount required'); return; }
    const row={loan_id:activeLoanId, period_id:pId, amount:amt, date_paid:$('#py_date').value||todayStr(), notes:$('#py_note').value.trim()};
    const d=await ins('loan_payments',row,data.payments); if(d) { closeSheet(); renderLoans(); }
  }
  async function unpayPeriod(pId, payId){ if(confirm('Remove cash inflow record payment item? Balance outstanding ledger rules restore.')){ await del('loan_payments',payId,data.payments); renderLoans(); } }

    $('#settingsBody').innerHTML=html;
  }
  
  async function savePref(k,v){ S[k]=v; applyTheme(); }
  
  async function saveSettingsDataBlock(){
    S.currency = $('#s_curr').value.trim() || DEFAULTS.currency;
    S.savingsPct = Number($('#s_pct').value) || 0;
    S.font = $('#s_font').value;
    $('#syncState').textContent='Syncing settings…';
    const {error}=await sb.from('app_settings').update({data:S}).eq('user_id',uid);
    if(error){ toast('Failed to save cloud preferences settings'); }
    else { toast('App preferences globally synced ✓'); applyTheme(); renderSettings(); }
  }
  
  async function authApproveSub(id, buyerUserIdOrEmail){
    try{
      let finalUid = null;
      if (buyerUserIdOrEmail.includes('@')) {
        const { data: userProfile, error: profileErr } = await sb.from('payment_submissions').select('user_id').eq('id',id).maybeSingle();
        if (userProfile && userProfile.user_id) {
          finalUid = userProfile.user_id;
        } else {
          toast('Could not auto-resolve User ID token context string automatically');
          finalUid = prompt("Enter explicit user_id guid key matching account database profile setup:");
          if(!finalUid) return;
        }
      } else {
        finalUid = buyerUserIdOrEmail;
      }
      
      const {error:accErr}=await sb.from('access').upsert({user_id:finalUid, paid:true},{onConflict:'user_id'});
      if(accErr) throw accErr;
      const {error:subErr}=await sb.from('payment_submissions').update({status:'approved'}).eq('id',id);
      if(subErr) throw subErr;
      
      const s=data.submissions.find(x=>x.id===id); if(s)s.status='approved';
      renderSettings(); toast('User system profile access unlocked successfully');
    }catch(e){ alert('Approval error processing logic: '+((e&&e.message)||e)); }
  }
  
  async function authRejectSub(id){
    try{
      const {error}=await sb.from('payment_submissions').update({status:'rejected'}).eq('id',id);
      if(error) throw error;
      const s=data.submissions.find(x=>x.id===id); if(s)s.status='rejected';
      renderSettings(); toast('Marked as rejected');
    }catch(e){ alert('Reject error: '+((e&&e.message)||e)); }
  }

  function emptyState(b,p){ return `<div class=\"empty\"><b>${b}</b>${p}</div>`; }

  /* ----- FAB router ----- */
  function fab(){ 
    if(tab==='budget'&&recurringView){ recurringForm(); return; } 
    ({shopping:shopForm,budget:()=>expenseForm(null),loans:loanForm,notes:()=>noteForm(),calendar:()=>noteForm(calSel||todayStr())}[tab]||(()=>{}))(); 
  }

  /* ----- init ----- */
  function init(){
    connect();
    bootstrap();
  }

  return { init, go, fab, saveCreds, closeSheet,
    authSubmit, authToggle, doLogout,
    toggleShop, delShop, shopForm, editShopForm, saveShop, onShopImg, clearShopImg,
    setPeriod, shiftMonth, renderBudget, incomeAddForm, editIncomeForm, saveIncomeLine, delInc,
    expenseForm, saveExpense, toggleExp, delExp,
    recurringForm, editRecurringForm, saveRecurring, askDelRecurring,
    noteForm, saveNote, delNote,
    calShift, calPick,
    loanForm, saveLoan, delLoan, planForm, savePlan, payForm, confirmPay, unpayPeriod, delPeriod, remindLoan,
    savePref, saveSettingsDataBlock, authApproveSub, authRejectSub, onPayProof, submitPayment, refreshAccess
  };
})();

// Trigger runtime bootstrap compilation engine loops automatically
App.init();
</script>
